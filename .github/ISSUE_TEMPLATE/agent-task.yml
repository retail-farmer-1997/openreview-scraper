name: Agent Task
description: Scoped implementation task for coding agents
title: "[task] "
labels:
  - task
body:
  - type: textarea
    id: objective
    attributes:
      label: Objective
      description: Describe the desired outcome.
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context
      description: Relevant background and constraints.
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: Explicit in-scope and out-of-scope details.
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      description: Machine-checkable conditions for done.
      placeholder: |
        - [ ] ...
        - [ ] ...
    validations:
      required: true
  - type: textarea
    id: dependencies
    attributes:
      label: Dependencies
      description: Linked issues or explicit "none".
