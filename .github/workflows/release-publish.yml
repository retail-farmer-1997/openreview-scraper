name: Release publish

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing release tag to verify, for example v0.1.0
        required: true
        type: string
      publish:
        description: Publish to PyPI after verification completes
        required: true
        type: boolean
        default: false

permissions:
  contents: read
  id-token: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: python -m pip install --upgrade pip uv

      - name: Sync locked packaging toolchain
        run: uv sync --group packaging --locked

      - name: Confirm release ref matches package version
        run: |
          set -euo pipefail
          uv run python - <<'PY'
          import re
          import os
          from pathlib import Path
          import tomllib

          pyproject = tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))
          dynamic = pyproject["project"].get("dynamic", [])
          if "version" not in dynamic:
              raise SystemExit("pyproject.toml must declare a dynamic project.version")
          version_attr = pyproject["tool"]["setuptools"]["dynamic"]["version"]["attr"]
          if version_attr != "openreview_scraper.__version__":
              raise SystemExit(
                  "pyproject.toml must source project.version from openreview_scraper.__version__"
              )
          init_text = Path("src/openreview_scraper/__init__.py").read_text(encoding="utf-8")
          match = re.search(r'__version__ = "([^"]+)"', init_text)
          if match is None:
              raise SystemExit("could not find __version__ in src/openreview_scraper/__init__.py")
          version = match.group(1)
          release_ref = os.environ["RELEASE_REF"]
          tag = release_ref
          if tag.startswith("refs/tags/"):
              tag = tag.removeprefix("refs/tags/")
          if not tag.startswith("v"):
              raise SystemExit(f"release ref must be a vX.Y.Z tag, got: {release_ref}")
          if tag[1:] != version:
              raise SystemExit(
                  f"release tag {tag} does not match package version {version}"
              )
          PY
        env:
          RELEASE_REF: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref }}

      - name: Run repo validation
        run: uv run python scripts/run_repo_checks.py all

      - name: Upload distributions for publication
        uses: actions/upload-artifact@v4
        with:
          name: distributions
          path: dist/*

  publish:
    needs: verify
    if: |
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) ||
      (github.event_name == 'workflow_dispatch' && inputs.publish)
    runs-on: ubuntu-latest
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: distributions
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
