name: Release publish

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Confirm tag matches package version
        if: github.event_name == 'push'
        run: |
          set -euo pipefail
          python - <<'PY'
          import re
          import os
          from pathlib import Path
          import tomllib

          version = tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))["project"]["version"]
          init_text = Path("src/openreview_scraper/__init__.py").read_text(encoding="utf-8")
          match = re.search(r'__version__ = "([^"]+)"', init_text)
          if match is None:
              raise SystemExit("could not find __version__ in src/openreview_scraper/__init__.py")
          cli_version = match.group(1)
          if cli_version != version:
              raise SystemExit(
                  f"package version mismatch: pyproject.toml has {version}, __init__.py has {cli_version}"
              )
          tag = os.environ["GITHUB_REF_NAME"]
          if tag.startswith("v"):
              tag = tag[1:]
          if tag != version:
              raise SystemExit(
                  f"release tag {os.environ['GITHUB_REF_NAME']} does not match package version {version}"
              )
          PY

      - name: Install packaging tools
        run: python -m pip install --upgrade pip build twine

      - name: Build distributions
        run: python -m build --sdist --wheel

      - name: Verify distribution metadata
        run: python -m twine check dist/*

      - name: Smoke test wheel install
        run: |
          set -euo pipefail
          wheel_venv="$(mktemp -d)"
          python -m venv "$wheel_venv"
          "$wheel_venv/bin/python" -m pip install --upgrade pip setuptools wheel
          "$wheel_venv/bin/pip" install dist/*.whl
          smoke_db="$(mktemp)"
          smoke_papers="$(mktemp -d)"
          export OPENREVIEW_SCRAPER_DB_PATH="$smoke_db"
          export OPENREVIEW_SCRAPER_PAPERS_DIR="$smoke_papers"
          "$wheel_venv/bin/openreview-scraper" --help >/dev/null
          "$wheel_venv/bin/openreview-scraper" --version >/dev/null
          "$wheel_venv/bin/openreview-scraper" db status >/dev/null

      - name: Smoke test sdist install
        run: |
          set -euo pipefail
          sdist_venv="$(mktemp -d)"
          python -m venv "$sdist_venv"
          "$sdist_venv/bin/python" -m pip install --upgrade pip setuptools wheel
          "$sdist_venv/bin/pip" install --no-build-isolation --no-deps dist/*.tar.gz
          smoke_db="$(mktemp)"
          smoke_papers="$(mktemp -d)"
          export OPENREVIEW_SCRAPER_DB_PATH="$smoke_db"
          export OPENREVIEW_SCRAPER_PAPERS_DIR="$smoke_papers"
          "$sdist_venv/bin/openreview-scraper" --help >/dev/null
          "$sdist_venv/bin/openreview-scraper" --version >/dev/null
          "$sdist_venv/bin/openreview-scraper" db status >/dev/null

      - name: Upload distributions for publication
        uses: actions/upload-artifact@v4
        with:
          name: distributions
          path: dist/*

  publish:
    needs: verify
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: distributions
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
