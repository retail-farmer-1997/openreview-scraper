name: Package verification

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: python -m pip install --upgrade pip uv

      - name: Sync locked packaging toolchain
        run: uv sync --group packaging --locked

      - name: Run repo validation
        run: uv run python scripts/run_repo_checks.py all

      - name: Upload verified distributions
        uses: actions/upload-artifact@v4
        with:
          name: distributions
          path: dist/*
